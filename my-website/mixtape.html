<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mixtape – Revolver Collective</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --black: #070707;
      --white: #f0ede6;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Oswald', sans-serif;
      min-height: 100dvh;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 70px;
      background: rgba(7,7,7,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.12);
    }
    .nav-logo { text-decoration: none; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }
    .nav-logo-item { display: none; }
    .nav-links > li > a {
      font-family: 'Oswald', sans-serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(240,237,230,0.5);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
      white-space: nowrap;
    }
    .nav-links > li > a:hover { color: var(--gold); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 120px 40px 60px;
      text-align: center;
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .page-header-label {
      font-size: 10px;
      letter-spacing: 6px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .page-header-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(36px, 6vw, 72px);
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--white);
    }
    .page-header-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 200px;
      margin: 24px auto 0;
    }
    .page-header-rule::before, .page-header-rule::after {
      content: '';
      flex: 1;
      height: 1px;
    }
    .page-header-rule::before { background: linear-gradient(to right, transparent, var(--gold)); }
    .page-header-rule::after  { background: linear-gradient(to left,  transparent, var(--gold)); }
    .page-header-rule-diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      margin: 0 10px;
      flex-shrink: 0;
    }

    /* ── MIXTAPE GRID ── */
    .mixtape-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 40px 100px;
    }
    .mixtape-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 32px;
    }
    .mixtape-card {
      border: 1px solid rgba(201,168,76,0.15);
      background: rgba(255,255,255,0.02);
      transition: border-color 0.3s;
    }
    .mixtape-card:hover { border-color: rgba(201,168,76,0.4); }
    .mixtape-video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background: #000;
    }
    .mixtape-video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .mixtape-card-title {
      padding: 18px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(201,168,76,0.1);
      text-align: center;
      padding: 32px 40px;
      font-size: 9px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    /* Hamburger - hidden on desktop */
    .hamburger { display: none; }

    @media (max-width: 800px) {
      .page-header { padding: 100px 24px 32px; }
      .mixtape-wrapper { padding: 24px 20px 80px; }
      .mixtape-grid { grid-template-columns: 1fr; gap: 24px; }
      .nav { padding: 0 20px; }

      .hamburger {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        z-index: 10000 !important;
        position: relative !important;
        width: 36px;
        height: 36px;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
      }
      .hamburger span {
        display: block;
        width: 22px;
        height: 2px;
        background: var(--white);
        transition: all 0.3s ease;
      }
      .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
      .hamburger.open span:nth-child(2) { opacity: 0; }
      .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

      .nav-links {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(160deg, #0d0a00 0%, #1c1400 35%, #2b1e00 65%, #0d0a00 100%);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        z-index: 9999;
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      .nav-links.open { opacity: 1; pointer-events: all; }
      .nav-links > li { width: 100%; text-align: center; }
      .nav-links > li > a {
        font-size: 24px;
        letter-spacing: 6px;
        padding: 15px 0;
        display: block;
        color: #f0ede6;
        text-transform: uppercase;
        font-family: 'Anton', sans-serif;
        border-bottom: 1px solid rgba(201,168,76,0.15);
        transition: color 0.25s, letter-spacing 0.25s;
      }
      .nav-links > li.nav-logo-item { display: list-item; border: none !important; padding: 0 0 40px 0; }
      .nav-links > li.nav-logo-item img { height: 100px; opacity: 0.9; display: block; margin: 0 auto; }
      .nav-links > li:nth-child(2) > a { border-top: 1px solid rgba(201,168,76,0.15) !important; }
      .nav-links > li > a:hover { color: #c9a84c; letter-spacing: 8px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <img src="REVOLVER_NEW__PUTIH_.png" alt="Revolver Collective" style="height:32px; display:block;" />
    </a>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li class="nav-logo-item"><img src="REVOLVER_NEW__PUTIH_.png" alt="Revolver Collective" /></li>
      <li><a href="index.html#top">Home</a></li>
      <li><a href="upcoming-events.html">Upcoming Events</a></li>
      <li><a href="recap-photo.html">Recap Photo</a></li>
      <li><a href="index.html#members">Members</a></li>
      <li><a href="mixtape.html">Mixtape</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div class="page-header-label">Revolver Collective</div>
    <div class="page-header-title">Mixtape</div>
    <div class="page-header-rule"><div class="page-header-rule-diamond"></div></div>
  </div>

  <div class="mixtape-wrapper" id="mixtape-wrapper">
    <div id="mixtape-loading" style="text-align:center;padding:80px 0;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.3);">LOADING MIXTAPES...</div>
  </div>

  <footer>
    © 2026 Revolver Collective &nbsp;·&nbsp; Yogyakarta, Indonesia
  </footer>

  <script>
    const SUPABASE_URL = 'https://bglpsruvpscbupltihzs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnbHBzcnV2cHNjYnVwbHRpaHpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzkzMjgsImV4cCI6MjA5NzExNTMyOH0.C2d3XtZdE2XSoSKVIDnJU1OQng5tuv_e9Ld8i3vM53E';

    // Figures out which platform a pasted link is from and pulls out the bit
    // needed to build a working embed — the 11-char ID for YouTube (covers
    // watch?v=, youtu.be/, embed/, nocookie embed), or the file ID for a
    // Google Drive share/view/open link.
    function detectVideoEmbed(url) {
      if (!url) return null;
      let m = url.match(/(?:youtube(?:-nocookie)?\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if (m) return { type: 'youtube', id: m[1] };
      m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (m) return { type: 'drive', id: m[1] };
      if (url.includes('drive.google.com')) {
        m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
        if (m) return { type: 'drive', id: m[1] };
      }
      return null;
    }

    function embedUrlFor(video) {
      return video.type === 'drive'
        ? `https://drive.google.com/file/d/${video.id}/preview`
        : `https://www.youtube-nocookie.com/embed/${video.id}`;
    }

    async function loadMixtapes() {
      const wrapper = document.getElementById('mixtape-wrapper');
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/mixtapes?order=sort_order.asc,created_at.asc`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();

        if (!data.length) {
          wrapper.innerHTML = '<div style="text-align:center;padding:80px 0;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.3);">NO MIXTAPES YET</div>';
          return;
        }

        wrapper.innerHTML = `<div class="mixtape-grid">${data.map(m => {
          const video = detectVideoEmbed(m.youtube_url);
          if (!video) return '';
          return `
            <div class="mixtape-card">
              <div class="mixtape-video-wrap">
                <iframe src="${embedUrlFor(video)}" title="${m.title || 'Mixtape'}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
              </div>
              <div class="mixtape-card-title">${m.title || ''}</div>
            </div>
          `;
        }).join('')}</div>`;
      } catch (err) {
        wrapper.innerHTML = '<div style="text-align:center;padding:80px 0;font-size:11px;letter-spacing:3px;color:rgba(255,80,80,0.4);">COULD NOT LOAD MIXTAPES</div>';
      }
    }

    loadMixtapes();
  </script>

  <script>
    function toggleMenu() {
      const nav = document.getElementById('nav-links');
      const btn = document.getElementById('hamburger');
      nav.classList.toggle('open');
      btn.classList.toggle('open');
    }
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', () => {
        document.getElementById('nav-links').classList.remove('open');
        document.getElementById('hamburger').classList.remove('open');
      });
    });
  </script>
</body>
</html>
