<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recap Photo – Revolver Collective</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --black: #070707;
      --white: #f0ede6;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Oswald', sans-serif;
      min-height: 100dvh;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 70px;
      background: rgba(7,7,7,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.12);
    }
    .nav-logo { text-decoration: none; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }
    .nav-logo-item { display: none; }
    .nav-links > li > a {
      font-family: 'Oswald', sans-serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(240,237,230,0.5);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
      white-space: nowrap;
    }
    .nav-links > li > a:hover { color: var(--gold); }
    .nav-dropdown { position: relative; }
    .nav-dropdown > a::after { content: ' ▾'; font-size: 9px; opacity: 0.5; }
    .nav-dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: -35px;
      background: rgba(10,9,8,0.97);
      border: 1px solid rgba(201,168,76,0.15);
      width: 160px;
      padding: 8px 0;
    }
    .nav-dropdown:hover .nav-dropdown-menu { display: block; }
    .nav-dropdown-menu a {
      display: block;
      padding: 10px 16px;
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(240,237,230,0.45);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s, background 0.2s;
    }
    .nav-dropdown-menu a:hover { color: var(--gold); background: rgba(201,168,76,0.05); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 120px 40px 60px;
      text-align: center;
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .page-header-label {
      font-size: 10px;
      letter-spacing: 6px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .page-header-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(36px, 6vw, 72px);
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--white);
    }
    .page-header-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 200px;
      margin: 24px auto 0;
    }
    .page-header-rule::before, .page-header-rule::after {
      content: '';
      flex: 1;
      height: 1px;
    }
    .page-header-rule::before { background: linear-gradient(to right, transparent, var(--gold)); }
    .page-header-rule::after  { background: linear-gradient(to left,  transparent, var(--gold)); }
    .page-header-rule-diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      margin: 0 10px;
      flex-shrink: 0;
    }

    /* ── GALLERY WRAPPER ── */
    .gallery-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 40px 100px;
    }

    /* ── EVENT SECTION ── */
    .event-section {
      margin-bottom: 80px;
    }
    .event-section-header {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }
    .event-section-name {
      font-family: 'Anton', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--white);
    }
    .event-section-date {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
    }
    .event-section-venue {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-left: auto;
    }

    /* ── MASONRY GRID ── */
    .masonry {
      columns: 3;
      column-gap: 8px;
    }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .masonry-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease, filter 0.4s ease;
      filter: brightness(0.85);
    }
    .masonry-item:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }
    .masonry-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .masonry-item:hover .masonry-item-overlay { opacity: 1; }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.95);
      align-items: center;
      justify-content: center;
    }
    .lightbox.active { display: flex; }
    .lightbox-img {
      max-width: 90vw;
      max-height: 90dvh;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 32px;
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .lightbox-close:hover { color: var(--gold); }
    .lightbox-prev, .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      padding: 20px;
      transition: color 0.3s;
      user-select: none;
    }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    .lightbox-prev:hover, .lightbox-next:hover { color: var(--gold); }
    .lightbox-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(201,168,76,0.1);
      text-align: center;
      padding: 32px 40px;
      font-size: 9px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    /* Hamburger - hidden on desktop */
    .hamburger { display: none; }
    .mobile-only { display: none; }

    @media (max-width: 800px) {
      .masonry { columns: 2; }
      .gallery-wrapper { padding: 40px 20px 80px; }
      .nav { padding: 0 20px; }
      .event-section-header { flex-wrap: wrap; }
      .event-section-venue { margin-left: 0; }

      .hamburger {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        z-index: 10000 !important;
        position: relative !important;
        width: 36px;
        height: 36px;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
      }
      .hamburger span {
        display: block;
        width: 22px;
        height: 2px;
        background: var(--white);
        transition: all 0.3s ease;
      }
      .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
      .hamburger.open span:nth-child(2) { opacity: 0; }
      .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

      .nav-links {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(160deg, #0d0a00 0%, #1c1400 35%, #2b1e00 65%, #0d0a00 100%);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        z-index: 9999;
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      .nav-links.open { opacity: 1; pointer-events: all; }
      .nav-links > li { width: 100%; text-align: center; }
      .nav-links > li > a {
        font-size: 24px;
        letter-spacing: 6px;
        padding: 15px 0;
        display: block;
        color: #f0ede6;
        text-transform: uppercase;
        font-family: 'Anton', sans-serif;
        border-bottom: 1px solid rgba(201,168,76,0.15);
        transition: color 0.25s, letter-spacing 0.25s;
      }
      .nav-links > li.nav-logo-item { display: list-item; border: none !important; padding: 0 0 40px 0; }
      .nav-links > li.nav-logo-item img { height: 100px; opacity: 0.9; display: block; margin: 0 auto; }
      .nav-links > li:nth-child(2) > a { border-top: 1px solid rgba(201,168,76,0.15) !important; }
      .nav-links > li > a:hover { color: #c9a84c; letter-spacing: 8px; }
      .nav-dropdown { display: none; }
    }
    @media (max-width: 480px) {
      .masonry { columns: 1; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <img src="REVOLVER_NEW__PUTIH_.png" alt="Revolver Collective" style="height:32px; display:block;" />
    </a>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li class="nav-logo-item"><img src="REVOLVER_NEW__PUTIH_.png" alt="Revolver Collective" /></li>
      <li><a href="index.html#top">Home</a></li>
      <li><a href="upcoming-events.html">Upcoming Events</a></li>
      <li><a href="recap-photo.html">Recap Photo</a></li>
      <li><a href="index.html#members">Members</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div class="page-header-label">Revolver Collective</div>
    <div class="page-header-title">Recap Photo</div>
    <div class="page-header-rule"><div class="page-header-rule-diamond"></div></div>
  </div>

  <div class="gallery-wrapper" id="gallery-wrapper">
    <div id="gallery-loading" style="text-align:center;padding:80px 0;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.3);">LOADING GALLERIES...</div>
  </div>


  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-close" onclick="closeLightbox()">✕ Close</div>
    <div class="lightbox-prev" onclick="event.stopPropagation(); navigate(-1)">‹</div>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
    <div class="lightbox-next" onclick="event.stopPropagation(); navigate(1)">›</div>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <footer>
    © 2026 Revolver Collective &nbsp;·&nbsp; Yogyakarta, Indonesia
  </footer>

  <script>
    const SUPABASE_URL = 'https://bglpsruvpscbupltihzs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnbHBzcnV2cHNjYnVwbHRpaHpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzkzMjgsImV4cCI6MjA5NzExNTMyOH0.C2d3XtZdE2XSoSKVIDnJU1OQng5tuv_e9Ld8i3vM53E';

    let galleries = [];
    let currentGallery = 0;
    let currentIndex = 0;

    function parsePhotos(raw) {
      if (!raw) return [];
      if (Array.isArray(raw)) return raw;
      try { return JSON.parse(raw); } catch { return []; }
    }

    // Inserts f_auto,q_auto into a Cloudinary URL for automatic format/compression.
    // Leaves old Supabase Storage URLs untouched.
    function cdnUrl(url) {
      if (url && url.includes('res.cloudinary.com') && url.includes('/upload/') && !url.includes('/upload/f_auto')) {
        return url.replace('/upload/', '/upload/f_auto,q_auto/');
      }
      return url;
    }

    async function loadGalleries() {
      const wrapper = document.getElementById('gallery-wrapper');
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/recap_galleries?order=sort_order.asc,created_at.desc`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();
        galleries = data.map(ev => parsePhotos(ev.photos));

        if (!data.length) {
          wrapper.innerHTML = '<div style="text-align:center;padding:80px 0;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.3);">NO GALLERIES YET</div>';
          return;
        }

        wrapper.innerHTML = data.map((ev, gi) => {
          const photos = parsePhotos(ev.photos);
          if (!photos.length) return '';
          return `
            <div class="event-section">
              <div class="event-section-header">
                <div class="event-section-name">${ev.event_name}</div>
                ${ev.event_date ? `<div class="event-section-date">${ev.event_date}</div>` : ''}
                ${ev.venue ? `<div class="event-section-venue">${ev.venue}</div>` : ''}
              </div>
              <div class="masonry">
                ${photos.map((p, i) => `
                  <div class="masonry-item" onclick="openLightbox(${gi}, ${i})">
                    <img src="${cdnUrl(p)}" alt="${ev.event_name}" loading="lazy" />
                    <div class="masonry-item-overlay"></div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        wrapper.innerHTML = '<div style="text-align:center;padding:80px 0;font-size:11px;letter-spacing:3px;color:rgba(255,80,80,0.4);">COULD NOT LOAD GALLERIES</div>';
      }
    }

    function openLightbox(gallery, index) {
      currentGallery = gallery;
      currentIndex = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
      if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      const imgs = galleries[currentGallery];
      currentIndex = (currentIndex + dir + imgs.length) % imgs.length;
      updateLightbox();
    }

    function updateLightbox() {
      const imgs = galleries[currentGallery];
      document.getElementById('lightbox-img').src = cdnUrl(imgs[currentIndex]);
      document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + imgs.length;
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'Escape') { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; }
    });

    loadGalleries();
  </script>

<script>
  function toggleMenu() {
    const nav = document.getElementById('nav-links');
    const btn = document.getElementById('hamburger');
    nav.classList.toggle('open');
    btn.classList.toggle('open');
  }
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.addEventListener('click', () => {
      document.getElementById('nav-links').classList.remove('open');
      document.getElementById('hamburger').classList.remove('open');
    });
  });
</script>
</body>
</html>
